{% extends 'complaints/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white text-center py-3">
                <a href="{% url 'home' %}" class="text-white text-decoration-none">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Login to SmartFix</h4>
                </a>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-info btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Forgot your password? <a href="{% url 'password_reset' %}">Reset it here</a></small>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">Don't have an account? <a href="{% url 'register' %}">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
